services:
  - type: web
    name: lylo-mechanic
    runtime: python
    rootDir: .
    buildCommand: pip install --upgrade pip && pip install .
    startCommand: cd backend && gunicorn -w 4 -b 0.0.0.0:$PORT app:app
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: POETRY_VERSION
        value: "0.0.0"
