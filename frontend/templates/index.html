:root {

  --border:       #1e2a38;

  --txt:          #c8d6e2;
  --txt-dim:      #4e6070;
  --txt-mid:      #7a96aa;
  --txt-hi:       #e8f4ff;

  --safe:         #00c87a;
  --safe-bg:      rgba(0,200,122,0.08);
  --caution:      #f0b429;
  --caution-bg:   rgba(240,180,41,0.08);
  --warning:      #f07c29;
  --warning-bg:   rgba(240,124,41,0.08);
  --danger:       #e03c3c;

  --emergency:    #ff1a1a;

  --font-body:    'IBM Plex Sans', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--txt);
  font-family: var(--font-body);
  font-size: 14px;
  line-height: 1.6;
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {

/* ═══════════════════════════════════════════════════

═══════════════════════════════════════════════════ */
.auth-modal {

  inset: 0;
  background: rgba(10,12,15,0.95);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
}

.auth-modal.hidden { display: none; }

.auth-card {
  background: var(--bg-card);
  border: 1px solid var(--border-hi);
  border-radius: 8px;
  padding: 40px;
  max-width: 420px;
  width: 90%;
}

.auth-header {

  margin-bottom: 32px;

.auth-logo {

.auth-title {

.auth-sub {

.auth-form {

}

.auth-input {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 12px 16px;
  color: var(--txt);
  font-family: var(--font-body);
  font-size: 14px;
  transition: border-color 0.2s;
}

.auth-input:focus {
  outline: none;
  border-color: var(--accent);
  background: var(--bg-card2);
}

.auth-input::placeholder {
  color: var(--txt-dim);
}

.auth-btn {
  background: var(--accent);
  border: none;
  border-radius: 4px;
  padding: 12px 16px;
  color: var(--bg);
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 14px;
  letter-spacing: 0.04em;
  cursor: pointer;
  transition: all 0.2s;
  text-transform: uppercase;
}

.auth-btn:hover { background: #00a8ff; }
.auth-btn:disabled { opacity: 0.5; cursor: not-allowed; }

.auth-toggle {
  text-align: center;
  font-size: 13px;
  color: var(--txt-dim);
}

.auth-toggle a {
  color: var(--accent);
  cursor: pointer;
  text-decoration: none;
  border-bottom: 1px solid var(--accent);
}

.auth-toggle a:hover { color: #00a8ff; }

.auth-error {
  background: var(--danger-bg);
  border: 1px solid rgba(224,60,60,0.3);
  color: var(--danger);
  padding: 10px 12px;
  border-radius: 4px;
  font-size: 12px;
  line-height: 1.5;
  display: none;
}

.auth-error.show { display: block; }

.auth-loading {
  display: none;
  text-align: center;
  color: var(--txt-dim);
  font-size: 12px;
}

.auth-loading.show { display: block; }

.spinner {
  display: inline-block;
  width: 14px;
  height: 14px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin-right: 8px;
  vertical-align: middle;
}

@keyframes spin { to { transform: rotate(360deg); } }

.auth-success {
  background: var(--safe-bg);
  border: 1px solid rgba(0,200,122,0.3);
  color: var(--safe);
  padding: 10px 12px;
  border-radius: 4px;
  font-size: 12px;
  display: none;
}

.auth-success.show { display: block; }

function toggleAuthMode() {
  isSignUpMode = !isSignUpMode;
  updateAuthUI();
  document.getElementById('authForm').reset();
  document.getElementById('authError').classList.remove('show');
  document.getElementById('authSuccess').classList.remove('show');
}

function updateAuthUI() {
  const submitBtn = document.getElementById('authSubmitBtn');
  const toggleText = document.querySelector('.auth-toggle a');
  const loadingText = document.getElementById('authLoadingText');

  if (isSignUpMode) {
    submitBtn.textContent = 'Sign Up';
    toggleText.textContent = 'Already have an account? Sign In';
    loadingText.textContent = 'Creating account...';
  } else {
    submitBtn.textContent = 'Sign In';
    toggleText.textContent = "Don't have an account? Sign Up";
    loadingText.textContent = 'Signing in...';
  }
}

async function handleLogout() {
  await supabase.auth.signOut();
  currentSession = null;
  document.getElementById('authModal').classList.remove('hidden');
  document.getElementById('app').style.display = 'none';
  document.getElementById('authForm').reset();
  document.getElementById('authError').classList.remove('show');
  document.getElementById('authSuccess').classList.remove('show');
  isSignUpMode = false;
  updateAuthUI();
}

/* ═══════════════════════════════════════════════════
   SCENARIOS
═══════════════════════════════════════════════════ */
const SCENARIO_BADGES = {
  p0420_not_the_converter:        { cls: 'safe',      txt: 'SAFE TO DRIVE' },
  flashing_misfire:               { cls: 'danger',    txt: 'TOW RECOMMENDED' },
  no_code_brake_danger:           { cls: 'danger',    txt: 'DO NOT DRIVE' },
  cleared_codes_incomplete_monitors: { cls: 'caution', txt: 'SHORT DISTANCE' },
};

async function loadScenarios() {
  try {
    const res = await fetch('/api/v1/scenarios/list', {
      headers: {
        'Authorization': `Bearer ${currentSession.access_token}`
      }
    });
    const list = await res.json();
    renderScenarioList(list);
  } catch(e) {
    document.getElementById('scenarioList').innerHTML =
      '<div class="empty-state">Backend offline</div>';
  }
}

function renderScenarioList(list) {
  const el = document.getElementById('scenarioList');
  el.innerHTML = list.map(s => {
    const badge = SCENARIO_BADGES[s.id] || { cls: 'caution', txt: 'SCENARIO' };
    return `
      <button class="scenario-btn" onclick="runScenario('${s.id}', this)" data-id="${s.id}">
        <span class="s-label">${s.label}</span>
        <span class="s-desc">${s.description}</span>
        <span class="s-badge ${badge.cls}">${badge.txt}</span>
      </button>`;
  }).join('');
}

async function runScenario(id, btn) {
  document.querySelectorAll('.scenario-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');

  showScanning();

  try {
    const res = await fetch(`/api/v1/diagnose/scenario/${id}`, {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${currentSession.access_token}`
      }
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    await delay(1400);
    showResults(data);
  } catch(e) {
    showError(e.message);
  }
}

function showScanning() {
  document.getElementById('welcomeState').style.display = 'none';
  document.getElementById('scanningState').style.display = 'flex';
  document.getElementById('resultsState').style.display = 'none';

  document.getElementById('connDot').className = 'conn-dot scanning';
  document.getElementById('connLabel').textContent = 'Connecting…';
  document.getElementById('connDetail').textContent = 'OBDLink MX+';

  const log = document.getElementById('scanLog');
  const progress = document.getElementById('scanProgressBar');
  log.innerHTML = '';

  const steps = [
    ['Establishing OBD-II connection…', 10],
    ['Protocol detected: ISO 15765-4 CAN', 22],
    ['Reading active DTCs…', 38],
    ['Running hypothesis engine…', 90],
    ['Applying Veracore truth check…', 100],
  ];

  let i = 0;
  function nextStep() {
    if (i >= steps.length) return;
    const [msg, pct] = steps[i++];
    const line = document.createElement('div');
    line.className = 'scan-log-line';
    line.textContent = `> ${msg}`;
    log.appendChild(line);
    log.scrollTop = log.scrollHeight;
    progress.style.width = pct + '%';
    if (i < steps.length) {
      setTimeout(nextStep, 140 + Math.random() * 120);
    } else {
      setTimeout(() => {
        log.querySelectorAll('.scan-log-line').forEach(l => l.classList.add('done'));
      }, 200);
    }
  }
  nextStep();
}

function showResults(data) {
  document.getElementById('welcomeState').style.display = 'none';
  document.getElementById('scanningState').style.display = 'none';
  document.getElementById('resultsState').style.display = 'block';

  document.getElementById('connDot').className = 'conn-dot connected';
  document.getElementById('connLabel').textContent = 'Connected';
  document.getElementById('connDetail').textContent = data.vehicle.make
    ? `${data.vehicle.year} ${data.vehicle.make} ${data.vehicle.model}`
    : 'Unknown Vehicle';

  const v = data.vehicle;
  const c = data.confidence;
  const s = data.safety;
  const confClass = c.label ? c.label.toLowerCase().replace(' ', '-') : 'moderate';
  const safetyClass = getSafetyClass(s.level);

  document.getElementById('topRow').innerHTML = `
    <div class="vehicle-panel">
      <div class="vehicle-make">${v.year || ''} ${v.make || ''} ${v.model || ''}</div>
      <div class="vehicle-details">
        ${v.engine ? `<span>${v.engine}</span>` : ''}
        ${v.odometer ? `<span>${v.odometer.toLocaleString()} mi</span>` : ''}
      </div>
    </div>

    <div class="confidence-panel">
      <div class="conf-label">Scan Confidence</div>
      <div class="conf-number" id="confNumber">0<span>%</span></div>
      <div class="conf-bar">
        <div class="conf-bar-fill ${confClass}" id="confBarFill" style="width:0%"></div>
      </div>
      <div class="conf-quality ${confClass}">${(c.label || 'MODERATE').toUpperCase()}</div>
    </div>

    <div class="safety-panel ${safetyClass}">
      <div class="safety-tag">Safety Status</div>
      <div class="safety-level">${s.level.replace(/_/g,' ')}</div>
    </div>`;

  animateNumber('confNumber', 0, c.overall * 100, 800, v => `${Math.round(v)}<span>%</span>`);
  setTimeout(() => {
    document.getElementById('confBarFill').style.width = (c.overall * 100) + '%';
  }, 100);
}

function showError(msg) {
  document.getElementById('welcomeState').style.display = 'flex';
  document.getElementById('scanningState').style.display = 'none';
  document.getElementById('resultsState').style.display = 'none';
  document.getElementById('connDot').className = 'conn-dot';
  document.getElementById('connLabel').textContent = 'Error';
  document.getElementById('connDetail').textContent = msg;
}

function getSafetyClass(level) {
  const map = {
    SAFE_TO_DRIVE: 'safe',
    DRIVE_SHORT_DISTANCE_ONLY: 'caution',
    INSPECT_SOON: 'warning',
    DO_NOT_DRIVE: 'danger',
    TOW_RECOMMENDED: 'danger',
    EMERGENCY_STOP_IMMEDIATELY: 'emergency',
  };
  return map[level] || 'caution';
}

function animateNumber(elId, from, to, duration, formatter) {
  const el = document.getElementById(elId);
  if (!el) return;
  const start = performance.now();
  function step(now) {
    const t = Math.min((now - start) / duration, 1);
    const ease = 1 - Math.pow(1 - t, 3);
    el.innerHTML = formatter(from + (to - from) * ease);
    if (t < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

function delay(ms) { return new Promise(r => setTimeout(r, ms)); }
